<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>替</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a; color: #d4d4d4;
    font-family: 'Noto Serif SC', serif;
    height: 100vh; display: flex;
    justify-content: center; align-items: center; overflow: hidden;
  }
  #main { text-align: center; animation: fadeIn 2s ease; }
  h1 { font-size: 72px; font-weight: 700; color: #e8e8e8; margin-bottom: 16px; letter-spacing: 8px; }
  .subtitle { font-size: 14px; color: #555; letter-spacing: 6px; margin-bottom: 60px; }
  .menu-btn {
    font-family: 'Noto Serif SC', serif; font-size: 15px; color: #888;
    background: none; border: 1px solid #333; padding: 12px 36px;
    cursor: pointer; letter-spacing: 4px; transition: all 0.3s;
    display: block; width: 200px; margin: 10px auto; text-align: center;
  }
  .menu-btn:hover { color: #e8e8e8; border-color: #888; }
  .menu-btn:disabled { color: #333; border-color: #1a1a1a; cursor: default; }
  .menu-btn:disabled:hover { color: #333; border-color: #1a1a1a; }

  #chapters { display: none; text-align: center; animation: fadeIn 1s ease; }
  #chapters h2 { font-size: 24px; color: #e8e8e8; letter-spacing: 4px; margin-bottom: 40px; }
  .chapter-card {
    font-family: 'Noto Serif SC', serif; font-size: 16px; color: #888;
    background: none; border: 1px solid #222; padding: 20px 40px;
    cursor: pointer; letter-spacing: 3px; transition: all 0.3s;
    display: block; width: 280px; margin: 12px auto; text-align: left;
  }
  .chapter-card:hover { color: #e8e8e8; border-color: #666; padding-left: 48px; }
  .chapter-card:disabled { color: #333; border-color: #1a1a1a; cursor: default; }
  .chapter-card:disabled:hover { color: #333; border-color: #1a1a1a; padding-left: 40px; }
  .chapter-card .ch-num { color: #c9a96e; font-size: 12px; letter-spacing: 2px; display: block; margin-bottom: 4px; }
  .chapter-card .ch-title { display: block; }
  .chapter-card .ch-lock { color: #333; font-size: 12px; }
  .back-btn {
    font-family: 'Noto Serif SC', serif; font-size: 14px; color: #555;
    background: none; border: none; cursor: pointer; margin-top: 40px;
    letter-spacing: 2px; transition: color 0.3s;
  }
  .back-btn:hover { color: #aaa; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div id="main">
  <h1>替</h1>
  <div class="subtitle">文字冒险</div>
  <button class="menu-btn" onclick="newGame()">新游戏</button>
  <button class="menu-btn" id="btn-continue" onclick="continueGame()" disabled>继续游戏</button>
  <button class="menu-btn" onclick="showChapters()">章节选择</button>
</div>

<div id="chapters">
  <h2>章节选择</h2>
  <div id="chapter-list"></div>
  <button class="back-btn" onclick="showMenu()">← 返回</button>
</div>

<script>
const chapters = [
  { id: 'prologue', title: '切', num: '序章', path: 'qie/', unlockKey: null, saveKey: 'qie_save' },
  { id: 'ch1', title: '数', num: '第一章', path: 'ch1/', unlockKey: 'qie_done', saveKey: 'ch1_save' },
];

function isUnlocked(ch) {
  if (!ch.unlockKey) return true;
  return localStorage.getItem(ch.unlockKey) === 'true';
}

function hasSave() {
  return chapters.some(ch => localStorage.getItem(ch.saveKey));
}

function getLatestSave() {
  for (let i = chapters.length - 1; i >= 0; i--) {
    if (localStorage.getItem(chapters[i].saveKey) && isUnlocked(chapters[i])) {
      return chapters[i];
    }
  }
  return null;
}

function newGame() {
  // Clear all saves
  chapters.forEach(ch => {
    localStorage.removeItem(ch.saveKey);
    localStorage.removeItem(ch.id + '_unlocked');
    localStorage.removeItem(ch.id + '_seenEndings');
    localStorage.removeItem(ch.id + '_done');
  });
  localStorage.removeItem('qie_done');
  window.location.href = chapters[0].path + '?new=1';
}

function continueGame() {
  const ch = getLatestSave();
  if (ch) window.location.href = ch.path;
  else window.location.href = chapters[0].path;
}

function showChapters() {
  document.getElementById('main').style.display = 'none';
  document.getElementById('chapters').style.display = 'block';
  const list = document.getElementById('chapter-list');
  list.innerHTML = '';
  chapters.forEach(ch => {
    const btn = document.createElement('button');
    btn.className = 'chapter-card';
    const ok = isUnlocked(ch);
    btn.disabled = !ok;
    btn.innerHTML = ok
      ? '<span class="ch-num">' + ch.num + '</span><span class="ch-title">' + ch.title + '</span>'
      : '<span class="ch-lock">\u{1F512} ' + ch.num + '</span>';
    if (ok) btn.onclick = () => { window.location.href = ch.path; };
    list.appendChild(btn);
  });
}

function showMenu() {
  document.getElementById('chapters').style.display = 'none';
  document.getElementById('main').style.display = 'block';
}

// Dev mode: ?dev=ch1 jumps to chapter
const devParam = new URLSearchParams(window.location.search).get('dev');
if (devParam) {
  // Unlock everything for dev
  chapters.forEach(ch => {
    if (ch.unlockKey) localStorage.setItem(ch.unlockKey, 'true');
  });
  const ch = chapters.find(c => c.id === devParam || c.path.includes(devParam));
  if (ch) window.location.href = ch.path;
}

// Init
document.getElementById('btn-continue').disabled = !hasSave();
</script>
</body>
</html>
